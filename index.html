<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>R6 Tracker PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Inter;background:#f4f6f8}
header{display:flex;justify-content:space-between;padding:16px;background:#fff;border-bottom:1px solid #ddd}
.logo{font-weight:900}
.layout{display:grid;grid-template-columns:260px 1fr}
.sidebar{background:#fff;padding:14px;border-right:1px solid #ddd}
.nav{padding:12px;border-radius:8px;margin-bottom:6px;cursor:pointer}
.nav.active{border:2px solid #000}
.main{padding:20px}

.card{background:#fff;padding:16px;border-radius:12px;border:1px solid #ddd;margin-bottom:12px;position:relative}
.card button{position:absolute;top:10px;right:10px;background:#ff4d4d;color:#fff;border:none;padding:4px 8px;border-radius:6px}

.avatar{width:40px;height:40px;border-radius:50%;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;margin-right:10px}
.row{display:flex;align-items:center}

.chat{background:#fff;border-radius:12px;border:1px solid #ddd;height:420px;display:flex;flex-direction:column}
.messages{flex:1;overflow:auto;padding:12px}
.msg{margin-bottom:10px}
.msg small{color:#777}

.input{display:flex;border-top:1px solid #ddd}
.input input{flex:1;border:none;padding:12px}
.input button{background:#000;color:#fff;border:none;padding:12px}

button{cursor:pointer;padding:8px 14px;border-radius:6px;border:none;background:#000;color:#fff}
button:active{transform:scale(0.96)}

.loader{border:4px solid #eee;border-top:4px solid #000;border-radius:50%;width:30px;height:30px;animation:spin 1s linear infinite;margin:auto}
@keyframes spin{100%{transform:rotate(360deg)}}

.status{width:10px;height:10px;border-radius:50%;background:lime;margin-left:6px}
</style>
</head>

<body>

<header>
<div class="logo">R6 Tracker PRO — so were in copper</div>
<div id="userInfo"></div>
<button onclick="logout()">Logout</button>
</header>

<!-- AUTH -->
<div id="auth" style="position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center">
<div>
<h2>Login</h2>
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<label><input type="checkbox" id="remember"> Remember me</label><br><br>
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
<div id="loader" class="loader" style="display:none"></div>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none" class="layout">

<div class="sidebar">
<div class="nav active" onclick="switchTab('dash',this)">Dashboard</div>
<div class="nav" onclick="switchTab('chat',this)">Chat</div>
<div class="nav" onclick="switchTab('friends',this)">Friends</div>
</div>

<div class="main">

<!-- DASH -->
<div id="dash">
<h2>Players</h2>
<input id="playerName" placeholder="Add player">
<button onclick="addPlayer()">Add</button>
<div id="players"></div>
</div>

<!-- CHAT -->
<div id="chat" style="display:none">
<input id="chatCode" placeholder="Enter Code">
<button onclick="joinChat()">Join</button>
<button onclick="createChat()">Create</button>
<h3 id="chatRoom"></h3>

<div class="chat">
<div id="messages" class="messages"></div>
<div class="input">
<input id="msg">
<button onclick="sendMsg()">Send</button>
</div>
</div>
</div>

<!-- FRIENDS -->
<div id="friends" style="display:none">
<input id="friendEmail" placeholder="Friend email">
<button onclick="addFriend()">Add</button>
<div id="friendList"></div>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user = null;
let chatId = null;
let unsub = null;

// AUTH
window.signup = async()=>{
  await createUserWithEmailAndPassword(auth,email.value,password.value);
}

window.login = async()=>{
  loader.style.display="block";
  await signInWithEmailAndPassword(auth,email.value,password.value);
}

window.logout = async()=>{
  await signOut(auth);
  location.reload();
}

onAuthStateChanged(auth, async(u)=>{
  if(u){
    user=u;
    auth.style.display="none";
    app.style.display="grid";

    // online status
    await setDoc(doc(db,"presence",user.uid),{
      email:user.email,
      online:true
    });

    userInfo.innerHTML = `
      <div class="row">
        <div class="avatar">${user.email[0].toUpperCase()}</div>
        ${user.email}
        <div class="status"></div>
      </div>
    `;

    loadPlayers();
    loadFriends();
  }
});

// NAV
window.switchTab=(v,e)=>{
  document.querySelectorAll(".nav").forEach(n=>n.classList.remove("active"));
  e.classList.add("active");

  dash.style.display=v==="dash"?"block":"none";
  chat.style.display=v==="chat"?"block":"none";
  friends.style.display=v==="friends"?"block":"none";
}

// PLAYERS
function fakeStats(){
  return {
    rank:["Copper","Bronze","Silver","Gold","Platinum"][Math.floor(Math.random()*5)],
    mmr:Math.floor(Math.random()*4500),
    kd:(Math.random()*2).toFixed(2)
  }
}

window.addPlayer=async()=>{
  if(!playerName.value)return;
  await addDoc(collection(db,"users",user.uid,"players"),{name:playerName.value});
  playerName.value="";
  loadPlayers();
}

async function loadPlayers(){
  players.innerHTML="<div class='loader'></div>";
  const snap=await getDocs(collection(db,"users",user.uid,"players"));
  players.innerHTML="";

  for(const d of snap.docs){
    const p=d.data().name;
    const s=fakeStats();

    players.innerHTML+=`
    <div class="card">
      <button onclick="delPlayer('${d.id}')">X</button>
      <div class="row">
        <div class="avatar">${p[0].toUpperCase()}</div>
        <div>
          <b>${p}</b><br>
          🏆 ${s.rank} | 💠 ${s.mmr} | ⚔️ ${s.kd}
        </div>
      </div>
      <br>
      <a target="_blank" href="https://tracker.gg/r6siege/profile/uplay/${p}">
      View Full Stats →
      </a>
    </div>`;
  }
}

window.delPlayer=async(id)=>{
  await deleteDoc(doc(db,"users",user.uid,"players",id));
  loadPlayers();
}

// CHAT
function gen(){return Math.random().toString(36).substring(2,7).toUpperCase()}

window.createChat=()=>{
  chatId=gen();
  chatRoom.innerText="Code: "+chatId;
  listen();
}

window.joinChat=()=>{
  chatId=chatCode.value;
  chatRoom.innerText="Joined: "+chatId;
  listen();
}

function listen(){
  if(unsub)unsub();

  unsub=onSnapshot(collection(db,"chats",chatId,"msgs"),snap=>{
    messages.innerHTML="";

    const sorted = snap.docs.sort((a,b)=>a.data().time-b.data().time);

    sorted.forEach(d=>{
      const m=d.data();

      messages.innerHTML+=`
      <div class="msg">
        <b>${m.u}</b>
        <small>${new Date(m.time).toLocaleTimeString()}</small><br>
        ${m.t}
      </div>`;

      // notification
      if(Notification.permission==="granted"){
        new Notification("New Message",{body:m.t});
      }
    });

    messages.scrollTop = messages.scrollHeight;
  });
}

window.sendMsg=async()=>{
  if(!msg.value)return;

  await addDoc(collection(db,"chats",chatId,"msgs"),{
    u:user.email,
    t:msg.value,
    time:Date.now()
  });

  msg.value="";
}

// FRIENDS
window.addFriend=async()=>{
  await addDoc(collection(db,"users",user.uid,"friends"),{
    email:friendEmail.value
  });
  loadFriends();
}

async function loadFriends(){
  friendList.innerHTML="";
  const snap=await getDocs(collection(db,"users",user.uid,"friends"));

  snap.forEach(d=>{
    const f=d.data().email;

    friendList.innerHTML+=`
    <div class="card row">
      <div class="avatar">${f[0].toUpperCase()}</div>
      ${f}
    </div>`;
  });
}

// notifications
Notification.requestPermission();

</script>

</body>
</html>
